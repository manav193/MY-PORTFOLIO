<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page not found - Manav Agarwal</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  
  <script>
    (function() {
      try {
        var localTheme = localStorage.getItem('premium-theme');
        var sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark-graphite' : 'light-apple';
        var activeTheme = localTheme || sysTheme;
        document.documentElement.setAttribute('data-theme', activeTheme);
      } catch (e) {}
    })();
  </script>
</head>
  <body>
    <main class="section hero" style="min-height:100svh">
      <div class="aurora" aria-hidden="true"></div>
      <div class="grid-motion" aria-hidden="true"></div>
      <div class="hero__inner" style="grid-template-columns:1fr">
        <div class="hero__copy">
          <p class="eyebrow">404</p>
          <h1>Lost route.</h1>
          <p class="hero__intro">This page is not available, but Manav Agarwal's creative technologist portfolio is one click away.</p>
          <div class="hero__actions">
            <a class="button button--primary" href="./">Back to Portfolio</a>
          </div>
        </div>
      </div>
    </main>
  
  <div class="cursor-dot" data-cursor-dot></div>
  <div class="cursor-ring" data-cursor-ring></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
