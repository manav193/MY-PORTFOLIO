name: One-time portfolio source normalization

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/source-cleanup-once.yml"
      - "scripts/source-cleanup-once.mjs"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize source
        run: node scripts/source-cleanup-once.mjs

      - name: Validate diff
        run: git diff --check

      - name: Commit normalized source
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No cleanup changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Normalize portfolio source after project retirement"
          git push origin HEAD:main
