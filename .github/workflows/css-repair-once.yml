name: One-time project CSS repair

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/css-repair-once.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove malformed orphan rule
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('frontend/css/project-page.css')
          s = p.read_text()
          s = s.replace('\n100% { filter: hue-rotate(45deg); } }\n', '\n')
          p.write_text(s)
          PY
      - name: Validate and commit
        run: |
          git diff --check
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/css/project-page.css
          git commit -m "Repair malformed project case-study CSS"
          git push origin HEAD:main
